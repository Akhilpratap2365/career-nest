{% extends 'base.html' %}
{% load static %}
{% block content %}
<!--gallery section start-->
                  <div class="row gallery py-3">
                   <p class="text-center fs-3">PICTURE <b class="text-mycolor1">GALLERY </b></p>
                   <div class="col-sm-10 mx-auto">
                    <div class="row">
                      {% for r in gal %}
                      <!--start gallery-->
                      <div class="col-sm-3">
                        <div class="card shadow-lg ">
                          <img src="../{{r.picture}}" class="card-img-top"/>
                          <p class="py-2 text-center fw-bold">{{r.title}}</p>
                        </div>
                      </div>
                      <!--end gallery-->
                      {% endfor %}
                    </div>
                   </div>
                  </div>
{% endblock %}
